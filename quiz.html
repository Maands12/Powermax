<section id="quiz-section" class="quiz-section">
    <div class="container">
        <h2 class="section-title">Quiz sobre Power Banks 🧠</h2>
        <div id="quiz-container" class="quiz-container">
            <h3 id="question-text" class="question-text"></h3>
            <div id="options-container" class="options-container"></div>
            <div id="feedback" class="feedback"></div>
            <button id="next-btn" class="btn btn-primary next-btn" style="display:none;">Próxima Pergunta</button>
        </div>
        <div id="result-container" class="result-container" style="display:none;">
            <h3 id="score-text"></h3>
            <button id="restart-btn" class="btn btn-secondary restart-btn" style="display:none;">Recomeçar Quiz</button>
        </div>
    </div>
</section>

<style>
    /* Reset básico */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

/* Fundo e texto base */
body, html {
    background: linear-gradient(135deg, #1a1a2e, #0f0c29);
    color: #ddd;
    min-height: 100vh;
}

/* Container centralizado */
.quiz-section {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 40px 20px;
    min-height: 100vh;
}

.container {
    background-color: #1f1b2e; /* Roxo escuro */
    max-width: 600px;
    width: 100%;
    border-radius: 12px;
    padding: 30px 40px;
    box-shadow: 0 8px 30px rgba(138, 43, 226, 0.4);
    border: 1px solid #482880;
    transition: box-shadow 0.3s ease;
}

.container:hover {
    box-shadow: 0 12px 40px rgba(138, 43, 226, 0.7);
}

/* Títulos */
.section-title {
    font-size: 2.2rem;
    font-weight: 700;
    text-align: center;
    color: #b388ff;
    margin-bottom: 25px;
    text-shadow: 0 0 6px #9c27b0;
}

.question-text {
    font-size: 1.5rem;
    font-weight: 600;
    margin-bottom: 20px;
    color: #d1c4e9;
    text-shadow: 0 0 4px #7e57c2;
}

/* Opções do quiz */
.options-container {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 20px;
}

.option-btn {
    background-color: #2a2350;
    color: #d1c4e9;
    border: 2px solid #6a4c93;
    border-radius: 8px;
    padding: 14px 20px;
    font-size: 1.1rem;
    text-align: left;
    cursor: pointer;
    box-shadow: inset 0 0 5px #5e35b1;
    transition:
        background-color 0.3s ease,
        border-color 0.3s ease,
        color 0.3s ease,
        transform 0.15s ease;
    user-select: none;
}

.option-btn:hover:not(:disabled),
.option-btn:focus:not(:disabled) {
    background-color: #6a4c93;
    border-color: #ab47bc;
    color: #fff;
    outline: none;
    transform: translateX(4px);
}

.option-btn:disabled {
    cursor: default;
    opacity: 0.7;
    box-shadow: none;
}

/* Feedback de resposta */
.feedback {
    font-weight: 700;
    font-size: 1.1rem;
    min-height: 28px;
    margin-bottom: 16px;
    color: #b388ff;
    text-shadow: 0 0 4px #9c27b0;
    transition: color 0.3s ease;
}

.correct {
    background-color: #6a1b9a !important; /* Roxo intenso */
    border-color: #ce93d8 !important;
    color: #e1bee7 !important;
    box-shadow: 0 0 8px #ce93d8 !important;
    transform: scale(1.05);
}

.wrong {
    background-color: #4a148c !important;
    border-color: #f48fb1 !important;
    color: #f8bbd0 !important;
    box-shadow: 0 0 8px #f48fb1 !important;
    transform: scale(1.05);
}

/* Botões */
.btn {
    padding: 12px 28px;
    font-size: 1.1rem;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-weight: 600;
    box-shadow: 0 4px 15px rgba(138, 43, 226, 0.6);
    transition:
        background-color 0.3s ease,
        box-shadow 0.3s ease,
        transform 0.15s ease;
    user-select: none;
}

.btn-primary {
    background: linear-gradient(45deg, #7e57c2, #ab47bc);
    color: #fff;
}

.btn-primary:hover:not(:disabled),
.btn-primary:focus:not(:disabled) {
    background: linear-gradient(45deg, #9c27b0, #ce93d8);
    box-shadow: 0 6px 20px #ce93d8;
    outline: none;
    transform: translateY(-2px);
}

.btn-secondary {
    background: linear-gradient(45deg, #4527a0, #311b92);
    color: #d1c4e9;
}

.btn-secondary:hover:not(:disabled),
.btn-secondary:focus:not(:disabled) {
    background: linear-gradient(45deg, #311b92, #7e57c2);
    box-shadow: 0 6px 20px #7e57c2;
    outline: none;
    transform: translateY(-2px);
}

.btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    box-shadow: none;
    transform: none;
}

/* Container resultado */
.result-container {
    text-align: center;
    color: #d1c4e9;
}

#score-text {
    font-size: 1.6rem;
    font-weight: 700;
    margin-bottom: 20px;
    text-shadow: 0 0 8px #ab47bc;
}

/* Scrollbar personalizado (para browsers baseados em WebKit) */
::-webkit-scrollbar {
    width: 8px;
}

::-webkit-scrollbar-track {
    background: #1f1b2e;
    border-radius: 8px;
}

::-webkit-scrollbar-thumb {
    background: #6a4c93;
    border-radius: 8px;
}

::-webkit-scrollbar-thumb:hover {
    background: #ab47bc;
}

/* Responsividade simples */
@media (max-width: 640px) {
    .container {
        padding: 20px 25px;
    }
    .section-title {
        font-size: 1.8rem;
    }
    .question-text {
        font-size: 1.3rem;
    }
    .option-btn {
        font-size: 1rem;
        padding: 12px 16px;
    }
    .btn {
        width: 100%;
        font-size: 1rem;
        padding: 12px 0;
    }
}

</style>

<script>
    // Dados do quiz
    const quizData = [
        {
            question: "O que é o objetivo principal de uma propaganda? ",
            options: [
                "Entreter o público sem intenção de venda",
                "Informar e persuadir o consumidor a comprar um produto ou serviço",
                "Confundir o consumidor para aumentar vendas",
                "Promover apenas eventos sociais"
            ],
            answer: "Informar e persuadir o consumidor a comprar um produto ou serviço"
        },
        {
            question: "Qual o tipo de propaganda que utiliza histórias emocionais para cativar o público?",
            options: [
                "Propaganda institucional",
                "Propaganda emocional",
                "Propaganda comparativa",
                "Propaganda informativa"
            ],
            answer: "Propaganda emocional"
        },
        {
            question: "O que significa o termo 'call to action' em uma peça publicitária?",
            options: [
                "Um convite para o consumidor realizar uma ação, como comprar ou acessar um site",
                "A introdução da marca na propaganda",
                "O slogan do produto",
                "Um tipo de anúncio em outdoors"
            ],
            answer: "Um convite para o consumidor realizar uma ação, como comprar ou acessar um site"
        },
        {
            question: "Qual canal de propaganda é caracterizado por anúncios em redes sociais e websites?",
            options: [
                "Publicidade offline",
                "Publicidade digital",
                "Publicidade impressa",
                "Publicidade televisiva"
            ],
            answer: "Publicidade digital"
        },
        {
            question: "Qual a principal característica da propaganda comparativa?",
            options: [
                "Compara produtos diferentes para destacar as vantagens de um deles",
                "Usa celebridades para divulgar a marca",
                "Foca em emoções para gerar vínculo com o consumidor",
                "Não mostra o produto explicitamente"
            ],
            answer: "Compara produtos diferentes para destacar as vantagens de um deles"
        },
        {
            question: "O que é um slogan em propaganda?",
            options: [
                "Uma música de fundo",
                "Uma frase curta que representa a marca ou produto",
                "Um tipo de imagem usada no anúncio",
                "Um código de desconto"
            ],
            answer: "Uma frase curta que representa a marca ou produto"
        },
        {
            question: "Qual é o papel do branding em uma campanha publicitária?",
            options: [
                "Aumentar o reconhecimento e valor da marca",
                "Diminuir os preços dos produtos",
                "Aumentar a produção em fábrica",
                "Controlar os custos da propaganda"
            ],
            answer: "Aumentar o reconhecimento e valor da marca"
        },
        {
            question: "Qual desses é um exemplo de propaganda subliminar?",
            options: [
                "Anúncio que aparece no meio de um filme de forma rápida e quase imperceptível",
                "Um comercial de 30 segundos na TV",
                "Um banner em um site de notícias",
                "Um anúncio em rádio"
            ],
            answer: "Anúncio que aparece no meio de um filme de forma rápida e quase imperceptível"
        },
        {
            question: "Qual elemento é fundamental para medir a eficácia de uma campanha publicitária?",
            options: [
                "O número de visualizações e a resposta do público",
                "A cor usada no anúncio",
                "O horário do comercial na TV",
                "A duração do anúncio"
            ],
            answer: "O número de visualizações e a resposta do público"
        },
        {
            question: "Qual é a vantagem da propaganda em vídeo nas redes sociais?",
            options: [
                "Pode ser compartilhada facilmente e alcançar um público maior rapidamente",
                "É sempre mais barata que propaganda impressa",
                "Não precisa de roteiro ou planejamento",
                "É obrigatória para todas as marcas"
            ],
            answer: "Pode ser compartilhada facilmente e alcançar um público maior rapidamente"
        }
    ];

    // Elementos DOM
    const quizContainer = document.getElementById('quiz-container');
    const questionText = document.getElementById('question-text');
    const optionsContainer = document.getElementById('options-container');
    const feedback = document.getElementById('feedback');
    const nextBtn = document.getElementById('next-btn');
    const resultContainer = document.getElementById('result-container');
    const scoreText = document.getElementById('score-text');
    const restartBtn = document.getElementById('restart-btn');

    let currentQuestionIndex = 0;
    let score = 0;

    function startQuiz() {
        currentQuestionIndex = 0;
        score = 0;
        resultContainer.style.display = 'none';
        quizContainer.style.display = 'block';
        nextBtn.style.display = 'none';
        restartBtn.style.display = 'none';
        feedback.innerText = '';
        showQuestion();
    }

    function showQuestion() {
        resetState();
        const currentQuestion = quizData[currentQuestionIndex];
        questionText.innerText = currentQuestion.question;

        // Embaralhar opções
        const shuffledOptions = currentQuestion.options
            .map(value => ({ value, sort: Math.random() }))
            .sort((a, b) => a.sort - b.sort)
            .map(({ value }) => value);

        shuffledOptions.forEach(option => {
            const button = document.createElement('button');
            button.innerText = option;
            button.classList.add('option-btn');
            button.addEventListener('click', () => selectAnswer(option, currentQuestion.answer));
            optionsContainer.appendChild(button);
        });
    }

    function selectAnswer(selectedOption, correctAnswer) {
        const options = optionsContainer.children;
        Array.from(options).forEach(button => {
            button.disabled = true;
            if (button.innerText === correctAnswer) {
                button.classList.add('correct');
            }
            if (button.innerText === selectedOption) {
                if (selectedOption === correctAnswer) {
                    feedback.innerText = '✅ Resposta correta!';
                    score++;
                } else {
                    button.classList.add('wrong');
                    feedback.innerText = `❌ Resposta incorreta. A correta era: ${correctAnswer}`;
                }
            }
        });

        nextBtn.style.display = 'inline-block';
    }

    function resetState() {
        while (optionsContainer.firstChild) {
            optionsContainer.removeChild(optionsContainer.firstChild);
        }
        feedback.innerText = '';
        nextBtn.style.display = 'none';
    }

    function handleNextButton() {
        currentQuestionIndex++;
        if (currentQuestionIndex < quizData.length) {
            showQuestion();
        } else {
            showResult();
        }
        nextBtn.style.display = 'none';
    }

    function showResult() {
        quizContainer.style.display = 'none';
        resultContainer.style.display = 'block';
        scoreText.innerText = `Você acertou ${score} de ${quizData.length} perguntas!`;
        restartBtn.style.display = 'inline-block';
    }

    nextBtn.addEventListener('click', handleNextButton);
    restartBtn.addEventListener('click', startQuiz);

    // Inicia o quiz ao carregar a página
    startQuiz();
</script>
